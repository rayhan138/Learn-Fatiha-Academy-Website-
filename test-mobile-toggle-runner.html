<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Toggle Test Runner</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #0d1822;
      color: #f7f3eb;
    }
    h1 {
      color: #d6b37b;
    }
    .test-results {
      margin-top: 2rem;
    }
    .test-case {
      padding: 1rem;
      margin: 0.5rem 0;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }
    .test-case.pass {
      border-color: #8fe1b8;
      background: rgba(143, 225, 184, 0.1);
    }
    .test-case.fail {
      border-color: #f6a6a6;
      background: rgba(246, 166, 166, 0.1);
    }
    .test-name {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .test-status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .test-status.pass {
      background: #8fe1b8;
      color: #07131c;
    }
    .test-status.fail {
      background: #f6a6a6;
      color: #07131c;
    }
    .summary {
      padding: 1.5rem;
      margin: 2rem 0;
      border-radius: 12px;
      background: rgba(27, 138, 120, 0.14);
      border: 1px solid rgba(214, 179, 123, 0.16);
    }
    .summary h2 {
      margin: 0 0 1rem 0;
      color: #d6b37b;
    }
    .error-message {
      margin-top: 0.5rem;
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.875rem;
      color: #f6a6a6;
    }
  </style>
</head>
<body>
  <h1>Mobile Menu Toggle Functionality Tests</h1>
  <p>Testing Requirements: 6.2, 6.3, 6.4, 6.5</p>
  
  <div class="summary" id="summary">
    <h2>Running tests...</h2>
  </div>

  <div class="test-results" id="results"></div>

  <script>
    // Simple test framework
    class TestRunner {
      constructor() {
        this.tests = [];
        this.results = [];
      }

      test(name, fn) {
        this.tests.push({ name, fn });
      }

      async run() {
        for (const test of this.tests) {
          try {
            await test.fn();
            this.results.push({ name: test.name, status: 'pass' });
          } catch (error) {
            this.results.push({ name: test.name, status: 'fail', error: error.message });
          }
        }
        this.displayResults();
      }

      displayResults() {
        const resultsDiv = document.getElementById('results');
        const summaryDiv = document.getElementById('summary');
        
        const passed = this.results.filter(r => r.status === 'pass').length;
        const failed = this.results.filter(r => r.status === 'fail').length;
        const total = this.results.length;

        summaryDiv.innerHTML = `
          <h2>Test Summary</h2>
          <p><strong>Total:</strong> ${total} | <strong>Passed:</strong> ${passed} | <strong>Failed:</strong> ${failed}</p>
        `;

        resultsDiv.innerHTML = this.results.map(result => `
          <div class="test-case ${result.status}">
            <div class="test-name">
              <span class="test-status ${result.status}">${result.status.toUpperCase()}</span>
              ${result.name}
            </div>
            ${result.error ? `<div class="error-message">${result.error}</div>` : ''}
          </div>
        `).join('');
      }
    }

    function expect(actual) {
      return {
        toBe(expected) {
          if (actual !== expected) {
            throw new Error(`Expected ${expected} but got ${actual}`);
          }
        },
        toBeTruthy() {
          if (!actual) {
            throw new Error(`Expected truthy value but got ${actual}`);
          }
        },
        toContain(item) {
          if (!actual.includes(item)) {
            throw new Error(`Expected array to contain ${item}`);
          }
        }
      };
    }

    // Setup DOM
    function setupDOM() {
      const container = document.createElement('div');
      container.id = 'test-container';
      container.style.display = 'none';
      container.innerHTML = '<div id="site-header"></div>';
      document.body.appendChild(container);
    }

    // Generate header
    function generateHeader() {
      const navItems = [
        { label: "Home", href: "index.html", key: "home" },
        { label: "About", href: "about.html", key: "about" },
        { label: "Courses", href: "courses.html", key: "courses" },
        { label: "Enroll", href: "enroll.html", key: "enroll" },
        { label: "PDF", href: "pdf.html", key: "pdf" },
        { label: "Blogs", href: "blogs.html", key: "blogs" },
        { label: "Contact", href: "contact.html", key: "contact" },
      ];

      function buildNav(linkClass) {
        return navItems
          .map(
            (item) => `
              <a href="${item.href}" class="${linkClass}" data-nav-key="${item.key}">
                ${item.label}
              </a>
            `
          )
          .join("");
      }

      const headerRoot = document.getElementById("site-header");
      if (headerRoot) {
        headerRoot.innerHTML = `
          <header class="site-header">
            <div class="header-inner">
              <a href="index.html" class="brand-logo">
                <img src="Logo/logo for header/Logo For Header.svg" alt="Learn Fatiha Academy" class="header-logo">
              </a>

              <nav class="desktop-nav" aria-label="Primary Navigation">
                ${buildNav("nav-link")}
              </nav>

              <button class="mobile-toggle" id="mobile-toggle" aria-label="Open menu" aria-controls="mobile-nav" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
              </button>
            </div>

            <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile Navigation">
              <div class="mobile-nav-inner">
                ${buildNav("mobile-nav-link")}
              </div>
            </nav>
          </header>
        `;
      }
    }

    // Initialize mobile toggle
    function initMobileToggle() {
      const toggle = document.getElementById("mobile-toggle");
      const mobileNav = document.getElementById("mobile-nav");

      if (toggle && mobileNav) {
        toggle.addEventListener("click", () => {
          const isOpen = mobileNav.classList.toggle("is-open");
          toggle.classList.toggle("is-open", isOpen);
          toggle.setAttribute("aria-expanded", String(isOpen));
          document.body.classList.toggle("menu-open", isOpen);
        });

        mobileNav.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", () => {
            mobileNav.classList.remove("is-open");
            toggle.classList.remove("is-open");
            toggle.setAttribute("aria-expanded", "false");
            document.body.classList.remove("menu-open");
          });
        });
      }
    }

    // Run tests
    const runner = new TestRunner();

    runner.test('Toggle button exists and has correct initial attributes', () => {
      const toggle = document.getElementById('mobile-toggle');
      expect(toggle).toBeTruthy();
      expect(toggle.getAttribute('aria-label')).toBe('Open menu');
      expect(toggle.getAttribute('aria-controls')).toBe('mobile-nav');
      expect(toggle.getAttribute('aria-expanded')).toBe('false');
    });

    runner.test('Mobile navigation exists and is initially closed', () => {
      const mobileNav = document.getElementById('mobile-nav');
      expect(mobileNav).toBeTruthy();
      expect(mobileNav.classList.contains('is-open')).toBe(false);
    });

    runner.test('Clicking toggle button opens mobile menu', () => {
      const toggle = document.getElementById('mobile-toggle');
      const mobileNav = document.getElementById('mobile-nav');

      // Initial state
      expect(toggle.classList.contains('is-open')).toBe(false);
      expect(mobileNav.classList.contains('is-open')).toBe(false);
      expect(document.body.classList.contains('menu-open')).toBe(false);
      expect(toggle.getAttribute('aria-expanded')).toBe('false');

      // Click to open
      toggle.click();

      // Verify open state
      expect(toggle.classList.contains('is-open')).toBe(true);
      expect(mobileNav.classList.contains('is-open')).toBe(true);
      expect(document.body.classList.contains('menu-open')).toBe(true);
      expect(toggle.getAttribute('aria-expanded')).toBe('true');
    });

    runner.test('Clicking toggle button twice closes mobile menu (Requirement 6.5)', () => {
      const toggle = document.getElementById('mobile-toggle');
      const mobileNav = document.getElementById('mobile-nav');

      // Click to close (from previous test)
      toggle.click();
      expect(toggle.classList.contains('is-open')).toBe(false);
      expect(mobileNav.classList.contains('is-open')).toBe(false);
      expect(document.body.classList.contains('menu-open')).toBe(false);
      expect(toggle.getAttribute('aria-expanded')).toBe('false');
    });

    runner.test('Toggle button adds/removes is-open class (Requirement 6.2)', () => {
      const toggle = document.getElementById('mobile-toggle');

      expect(toggle.classList.contains('is-open')).toBe(false);
      
      toggle.click();
      expect(toggle.classList.contains('is-open')).toBe(true);
      
      toggle.click();
      expect(toggle.classList.contains('is-open')).toBe(false);
    });

    runner.test('Mobile navigation expands and collapses correctly (Requirement 6.3)', () => {
      const toggle = document.getElementById('mobile-toggle');
      const mobileNav = document.getElementById('mobile-nav');

      expect(mobileNav.classList.contains('is-open')).toBe(false);
      
      toggle.click();
      expect(mobileNav.classList.contains('is-open')).toBe(true);
      
      toggle.click();
      expect(mobileNav.classList.contains('is-open')).toBe(false);
    });

    runner.test('Body class menu-open is toggled appropriately (Requirement 6.4)', () => {
      const toggle = document.getElementById('mobile-toggle');

      expect(document.body.classList.contains('menu-open')).toBe(false);
      
      toggle.click();
      expect(document.body.classList.contains('menu-open')).toBe(true);
      
      toggle.click();
      expect(document.body.classList.contains('menu-open')).toBe(false);
    });

    runner.test('aria-expanded attribute updates correctly (Requirement 6.5)', () => {
      const toggle = document.getElementById('mobile-toggle');

      expect(toggle.getAttribute('aria-expanded')).toBe('false');
      
      toggle.click();
      expect(toggle.getAttribute('aria-expanded')).toBe('true');
      
      toggle.click();
      expect(toggle.getAttribute('aria-expanded')).toBe('false');
    });

    runner.test('Clicking navigation link closes mobile menu', () => {
      const toggle = document.getElementById('mobile-toggle');
      const mobileNav = document.getElementById('mobile-nav');
      const navLink = mobileNav.querySelector('a');

      // Open menu
      toggle.click();
      expect(mobileNav.classList.contains('is-open')).toBe(true);

      // Click navigation link
      navLink.click();

      // Verify menu is closed
      expect(mobileNav.classList.contains('is-open')).toBe(false);
      expect(toggle.classList.contains('is-open')).toBe(false);
      expect(document.body.classList.contains('menu-open')).toBe(false);
      expect(toggle.getAttribute('aria-expanded')).toBe('false');
    });

    runner.test('All navigation items are present in mobile menu', () => {
      const mobileNav = document.getElementById('mobile-nav');
      const navLinks = mobileNav.querySelectorAll('.mobile-nav-link');
      
      expect(navLinks.length).toBe(7);
    });

    // Initialize and run
    setupDOM();
    generateHeader();
    initMobileToggle();
    runner.run();
  </script>
</body>
</html>
