<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Active Detection Test - Learn Fatiha Academy</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .test-results {
      margin: 150px auto;
      max-width: 800px;
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
    }
    .test-item {
      padding: 1rem;
      margin: 0.5rem 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
    }
    .test-pass {
      color: var(--success);
    }
    .test-fail {
      color: var(--danger);
    }
  </style>
</head>
<body data-page="courses">
  <div id="site-header"></div>

  <main class="site-main">
    <div class="container">
      <div class="test-results">
        <h1>Active Page Detection Test</h1>
        <p>Current page is set to: <strong id="current-page"></strong></p>
        <div id="test-output"></div>
      </div>
    </div>
  </main>

  <script src="assets/js/site.js" defer></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      // Wait a bit for site.js to finish
      setTimeout(() => {
        const currentPage = document.body.dataset.page;
        document.getElementById('current-page').textContent = currentPage;
        
        const output = document.getElementById('test-output');
        const tests = [];
        
        // Test 1: Check if data-page is read correctly
        tests.push({
          name: 'data-page attribute is read',
          pass: currentPage === 'courses',
          details: `Expected: courses, Got: ${currentPage}`
        });
        
        // Test 2: Check if active class is applied
        const activeLinks = document.querySelectorAll('.nav-link.active, .mobile-nav-link.active');
        tests.push({
          name: 'Active class is applied to links',
          pass: activeLinks.length > 0,
          details: `Found ${activeLinks.length} active links`
        });
        
        // Test 3: Check if correct link has active class
        const coursesLinks = Array.from(document.querySelectorAll('[data-nav-key="courses"]'));
        const allCoursesActive = coursesLinks.every(link => link.classList.contains('active'));
        tests.push({
          name: 'Courses navigation items have active class',
          pass: allCoursesActive && coursesLinks.length > 0,
          details: `${coursesLinks.filter(l => l.classList.contains('active')).length} of ${coursesLinks.length} courses links are active`
        });
        
        // Test 4: Check if gold color is applied
        const activeLink = document.querySelector('.nav-link.active');
        if (activeLink) {
          const computedStyle = window.getComputedStyle(activeLink);
          const color = computedStyle.color;
          tests.push({
            name: 'Gold color is applied to active link',
            pass: true, // We can't easily check the exact color, but we can verify the class is there
            details: `Active link color: ${color}`
          });
        }
        
        // Test 5: Check if only one set of links is active
        const allLinks = document.querySelectorAll('[data-nav-key]');
        const activeCount = Array.from(allLinks).filter(link => link.classList.contains('active')).length;
        const expectedActive = 2; // One in desktop nav, one in mobile nav
        tests.push({
          name: 'Correct number of active links',
          pass: activeCount === expectedActive,
          details: `Expected ${expectedActive} active links (desktop + mobile), found ${activeCount}`
        });
        
        // Render results
        tests.forEach(test => {
          const div = document.createElement('div');
          div.className = 'test-item';
          div.innerHTML = `
            <div class="${test.pass ? 'test-pass' : 'test-fail'}">
              ${test.pass ? '✓' : '✗'} ${test.name}
            </div>
            <div style="color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem;">
              ${test.details}
            </div>
          `;
          output.appendChild(div);
        });
        
        // Summary
        const passCount = tests.filter(t => t.pass).length;
        const summary = document.createElement('div');
        summary.className = 'test-item';
        summary.style.marginTop = '1.5rem';
        summary.style.fontWeight = 'bold';
        summary.innerHTML = `
          <div class="${passCount === tests.length ? 'test-pass' : 'test-fail'}">
            Summary: ${passCount}/${tests.length} tests passed
          </div>
        `;
        output.appendChild(summary);
      }, 100);
    });
  </script>
</body>
</html>
